server:
  undertow:
    threads:
      worker: 10
      io: 2

spring:
  datasource:
    driver-class-name: org.h2.Driver
    username: root
    password: 123456
    url: jdbc:h2:mem:template;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE # change this to your database type, postgresql, mysql or other
  test:
    database:
      replace: none
  h2:
    console:
      enabled: true
      path: /h2
#  datasource: # change this configurations to your database
#    url: jdbc:postgresql://localhost:5434/template
#    username: postgres
#    password: 123456
  jpa:
    show-sql: true
    hibernate:
      ddl-auto: update
