es:
  eventstore:
    outboxEnabled: true

spring:
  datasource:
    driver-class-name: org.h2.Driver
    username: root
    password: 123456
    url: jdbc:h2:mem:template;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE # change this to your database type, postgresql, mysql or other
  test:
    database:
      replace: none
  h2:
    console:
      enabled: true
      path: /h2
  jpa:
    properties:
      hibernate:
        dialect: com.kaua.event.driven.infrastructure.configurations.CustomH2Dialect
    hibernate:
      ddl-auto: update
