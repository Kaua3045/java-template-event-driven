services:
  zookeeper:
    image: confluentinc/cp-zookeeper:latest
    container_name: order-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
    networks:
      - order-microservice-network
      - kafka

  kafka:
    image: confluentinc/cp-kafka:latest
    container_name: order-kafka
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
      - "29094:29094"
    #      - "9094:9094"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENERS: LISTENER_BOB://kafka:29092,LISTENER_FRED://kafka:9092,LISTENER_ALICE://kafka:29094
      KAFKA_ADVERTISED_LISTENERS: LISTENER_BOB://kafka:29092,LISTENER_FRED://localhost:9092,LISTENER_ALICE://never-gonna-give-you-up:29094
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: LISTENER_BOB:PLAINTEXT,LISTENER_FRED:PLAINTEXT,LISTENER_ALICE:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: LISTENER_BOB
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 100
    #      KAFKA_BROKER_ID: 1
    #      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
    #      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
    #      KAFKA_INTER_BROKER_LISTENER_NAME: INTERNAL
    #      KAFKA_LISTENERS: INTERNAL://:9092,OUTSIDE://:9094
    #      KAFKA_ADVERTISED_LISTENERS: INTERNAL://kafka:9092,OUTSIDE://172.17.0.1:9094
    #      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: INTERNAL:PLAINTEXT,OUTSIDE:PLAINTEXT
    #    extra_hosts:
    #      - "host.docker.internal:172.17.0.1"
    networks:
      - order-microservice-network
      - kafka

  control-center:
    image: confluentinc/cp-enterprise-control-center:latest
    container_name: kafka-control-center
    depends_on:
      - kafka
      - zookeeper
    ports:
      - "9021:9021"
    environment:
      CONTROL_CENTER_BOOTSTRAP_SERVERS: kafka:29092
      CONTROL_CENTER_ZOOKEEPER_CONNECT: zookeeper:2181
      CONTROL_CENTER_REPLICATION_FACTOR: 1
      PORT: 9021
    networks:
      - order-microservice-network
      - kafka

networks:
  order-microservice-network:
  kafka:
    external: true